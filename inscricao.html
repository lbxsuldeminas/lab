<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição LBX</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
    }

    body{
      background:#0f172a;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .card{
      width:100%;
      max-width:450px;
      background:#111827;
      padding:30px;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#38bdf8;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
    }

    input, select, textarea{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1f2937;
      color:white;
      margin-bottom:18px;
      outline:none;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border:1px solid #38bdf8;
    }

    textarea{
      resize:none;
      height:90px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#16a34a;
    }

    .sucesso{
      margin-top:20px;
      background:#16a34a;
      padding:12px;
      border-radius:10px;
      text-align:center;
      display:none;
    }

  </style>
</head>

<body>

  <div class="card">

    <h1>Inscrição LBX</h1>

    <form id="formulario">

      <label>Nome completo</label>
      <input type="text" required>

      <label>Telefone</label>
      <input type="tel" required>

      <label>Idade</label>
      <input type="number" required>

      <label>Posição</label>
      <select required>
        <option value="">Selecione</option>
        <option>Levantador</option>
        <option>Ponteiro</option>
        <option>Central</option>
        <option>Oposto</option>
        <option>Líbero</option>
      </select>

      <label>Observações</label>
      <textarea placeholder="Opcional"></textarea>

      <button type="submit">
        Enviar Inscrição
      </button>

    </form>

    <div class="sucesso" id="sucesso">
      Inscrição enviada com sucesso!
    </div>

  </div>

<script>

const form = document.getElementById("formulario");
const sucesso = document.getElementById("sucesso");

form.addEventListener("submit", function(e){

  e.preventDefault();

  sucesso.style.display = "block";

  form.reset();

});

</script>

</body>
</html>
