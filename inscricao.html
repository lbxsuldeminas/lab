<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição LBX</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
    }

    body{
      background:#0f172a;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .card{
      width:100%;
      max-width:450px;
      background:#111827;
      padding:30px;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      color:#38bdf8;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
    }

    input, select{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1f2937;
      color:white;
      margin-bottom:18px;
      outline:none;
    }

    input:focus,
    select:focus{
      border:1px solid #38bdf8;
    }

    .valor{
      background:#1e293b;
      padding:15px;
      border-radius:12px;
      text-align:center;
      font-size:18px;
      font-weight:700;
      margin-bottom:20px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#16a34a;
    }

    .sucesso{
      margin-top:20px;
      background:#16a34a;
      padding:12px;
      border-radius:10px;
      text-align:center;
      display:none;
    }

  </style>
</head>

<body>

  <div class="card">

    <h1>Inscrição LBX</h1>

    <form id="formulario">

      <label>Nome completo</label>
      <input type="text" required>

      <label>Email</label>
      <input type="email" required>

      <label>Sexo</label>
      <select id="sexo" required>
        <option value="">Selecione</option>
        <option value="masculino">Masculino</option>
        <option value="feminino">Feminino</option>
      </select>

      <label>Data de nascimento</label>
      <input type="date" id="nascimento" required>

      <div class="valor" id="valor">
        Valor da inscrição: R$ 0
      </div>

      <button type="submit">
        Enviar Inscrição
      </button>

    </form>

    <div class="sucesso" id="sucesso">
      Inscrição enviada com sucesso!
    </div>

  </div>

<script>

const nascimento = document.getElementById("nascimento");
const sexo = document.getElementById("sexo");
const valor = document.getElementById("valor");

function calcularIdade(data){

  const hoje = new Date();
  const nasc = new Date(data);

  let idade =
    hoje.getFullYear() - nasc.getFullYear();

  const mes =
    hoje.getMonth() - nasc.getMonth();

  if(
    mes < 0 ||
    (mes === 0 && hoje.getDate() < nasc.getDate())
  ){
    idade--;
  }

  return idade;
}

function atualizarValor(){

  if(!nascimento.value || !sexo.value){
    valor.innerHTML =
      "Valor da inscrição: R$ 0";
    return;
  }

  const idade =
    calcularIdade(nascimento.value);

  let preco = 30;

  if(
    sexo.value === "masculino" &&
    idade >= 18
  ){
    preco = 40;
  }

  valor.innerHTML =
    `Valor da inscrição: R$ ${preco}`;
}

nascimento.addEventListener(
  "change",
  atualizarValor
);

sexo.addEventListener(
  "change",
  atualizarValor
);

const form =
  document.getElementById("formulario");

const sucesso =
  document.getElementById("sucesso");

form.addEventListener("submit", function(e){

  e.preventDefault();

  sucesso.style.display = "block";

  form.reset();

  valor.innerHTML =
    "Valor da inscrição: R$ 0";

});

</script>

</body>
</html>
