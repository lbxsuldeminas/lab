<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inscrição LBX</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#111827;
  padding:25px;
  border-radius:12px;
  width:400px;
}
.valor{
  background:#0ea5e9;
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin:10px 0;
}
button{
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
}
#pixArea{display:none;text-align:center;}
</style>

</head>
<body>

<div class="card">

<h2>Inscrição LBX</h2>

<form id="form">
<input id="nome" placeholder="Nome" required>
<input type="date" id="nascimento" required>

<select id="cadastro">
<option value="sim">Sim</option>
<option value="nao">Não</option>
</select>

<div class="valor" id="valor">Valor: -</div>

<button type="submit">Confirmar</button>
</form>

<div id="pixArea">
<h3>Pagamento PIX</h3>
<p id="pixValor"></p>
<img id="qr" width="220">
</div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbw5HPiIZrtz_xauXCSTI0WmZ1INkHe0d3vqh3SyBQOOOQ6eNOUFBWZW36tdX58aUw9J/exec";

const nascimento = document.getElementById("nascimento");
const valorTxt = document.getElementById("valor");

function idade(data){
  let hoje = new Date();
  let nasc = new Date(data);
  let i = hoje.getFullYear() - nasc.getFullYear();
  return i;
}

nascimento.addEventListener("change",()=>{
  let v = idade(nascimento.value) >= 18 ? 40 : 30;
  valorTxt.innerText = "Valor: R$ " + v;
});

document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  let nome = document.getElementById("nome").value;
  let nasc = nascimento.value;
  let cadastro = document.getElementById("cadastro").value;
  let idadeCalc = idade(nasc);
  let valor = idadeCalc >= 18 ? 40 : 30;

  try {

    const res = await fetch(url,{
      method:"POST",
      mode:"no-cors", // 🔥 CORREÇÃO DO CORS
      body: JSON.stringify({
        nome,
        nascimento:nasc,
        idade:idadeCalc,
        cadastro,
        valor
      })
    });

    // ⚠️ no-cors não retorna resposta → vamos simular QR
    document.getElementById("form").style.display="none";
    document.getElementById("pixArea").style.display="block";

    document.getElementById("pixValor").innerText = "Valor: R$ " + valor;

    document.getElementById("qr").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PIX_LBX";

  } catch(err){
    alert("Erro ao enviar");
    console.log(err);
  }

});

</script>

</body>
</html>
