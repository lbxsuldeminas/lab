<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Inscrição LBX</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:#111827;
      padding:25px;
      border-radius:12px;
      width:100%;
      max-width:420px;
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#38bdf8;
    }

    label{
      font-size:14px;
      opacity:0.9;
    }

    input, select{
      width:100%;
      padding:10px;
      margin-top:5px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      outline:none;
      font-size:14px;
    }

    input:focus, select:focus{
      box-shadow:0 0 0 2px #38bdf8;
    }

    .valor{
      background:#0ea5e9;
      padding:12px;
      border-radius:8px;
      text-align:center;
      font-weight:bold;
      margin:15px 0;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#16a34a;
    }

    .info{
      text-align:center;
      font-size:12px;
      opacity:0.7;
      margin-top:10px;
    }

    #pixArea{
      display:none;
      text-align:center;
    }

    .pix-valor{
      font-size:18px;
      font-weight:bold;
      color:#22c55e;
      margin:10px 0;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Inscrição Torneio LBX</h2>

  <form id="formInscricao">

    <label>Nome completo</label>
    <input type="text" id="nome" required>

    <label>Data de nascimento</label>
    <input type="date" id="nascimento" required>

    <label>Já possui cadastro na LBX?</label>
    <select id="cadastro">
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>

    <div class="valor" id="valor">Valor da inscrição: -</div>

    <button type="submit">Confirmar Inscrição</button>

    <div class="info">
      Após confirmar, será gerado o pagamento Pix.
    </div>

  </form>

  <div id="pixArea">

    <h2>Pagamento Pix</h2>

    <p>Escaneie o QR Code abaixo:</p>

    <div class="pix-valor" id="pixValor"></div>

    <img id="qr" width="220">

  </div>

</div>

<script>

const url = "https://lab-nu-three.vercel.app/api/pagamento";

const nascimentoInput = document.getElementById("nascimento");
const valorTexto = document.getElementById("valor");
const form = document.getElementById("formInscricao");

const pixArea = document.getElementById("pixArea");
const pixValor = document.getElementById("pixValor");

function calcularIdade(dataNascimento) {
  const hoje = new Date();
  const nascimento = new Date(dataNascimento);

  let idade = hoje.getFullYear() - nascimento.getFullYear();
  const mes = hoje.getMonth() - nascimento.getMonth();

  if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
    idade--;
  }

  return idade;
}

nascimentoInput.addEventListener("change", () => {
  if (!nascimentoInput.value) return;

  const idade = calcularIdade(nascimentoInput.value);
  valorTexto.innerText = "Valor da inscrição: R$" + (idade >= 18 ? 40 : 30);
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const nascimento = nascimentoInput.value;

  const idade = calcularIdade(nascimento);
  const valor = idade >= 18 ? 40 : 30;

  try {
    const response = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        nome,
        valor
      })
    });

    const result = await response.json();

    if (result.erro) {
      alert("Erro: " + result.erro);
      return;
    }

    form.style.display = "none";
    pixArea.style.display = "block";

    pixValor.innerText = "Valor: R$ " + valor;

    document.getElementById("qr").src =
      "data:image/png;base64," + result.qr_base64;

  } catch (err) {
    console.log(err);
    alert("Erro ao criar pagamento");
  }
});

</script>

</body>
</html>
