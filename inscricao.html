<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LBX - Inscrição Torneios</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

  background:
  linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)),
  url('https://images.unsplash.com/photo-1586165368502-1bad197a6461?q=80&w=1200');

  background-size:cover;
  background-position:center;

  color:white;
}

.card{
  width:100%;
  max-width:460px;

  background:rgba(15,15,15,0.92);

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(8px);

  padding:35px;

  border-radius:22px;

  box-shadow:
  0 0 30px rgba(0,0,0,0.7);
}

h1{
  text-align:center;
  margin-bottom:30px;

  color:#d4af37;

  font-size:30px;

  font-weight:700;

  letter-spacing:1px;
}

label{
  display:block;

  margin-bottom:7px;

  font-size:14px;

  color:#d1d5db;
}

input,
select{
  width:100%;

  padding:14px;

  border:none;

  border-radius:12px;

  background:#1a1a1a;

  color:white;

  margin-bottom:18px;

  outline:none;

  border:1px solid #2d2d2d;

  transition:0.2s;
}

input:focus,
select:focus{

  border:1px solid #d4af37;

  box-shadow:
  0 0 10px rgba(212,175,55,0.3);
}

.valor{

  background:
  linear-gradient(135deg,#d4af37,#8b6b1f);

  color:black;

  padding:16px;

  border-radius:14px;

  text-align:center;

  font-size:20px;

  font-weight:700;

  margin-bottom:20px;
}

button{

  width:100%;

  padding:15px;

  border:none;

  border-radius:14px;

  background:
  linear-gradient(135deg,#d4af37,#8b6b1f);

  color:black;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

  transition:0.25s;
}

button:hover{

  transform:translateY(-2px);

  box-shadow:
  0 10px 20px rgba(212,175,55,0.25);
}

</style>
</head>

<body>

  <div class="card">

    <h1>LBX - Inscrição Torneios</h1>

    <form id="formulario">

      <label>Nome completo</label>
      <input type="text" required>

      <label>Data de nascimento</label>
      <input type="date" id="nascimento" required>

      <label>Tem cadastro na LBX?</label>
      <select required>
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
      </select>

      <div class="valor" id="valor" style="display:none;">
      </div>

      <button type="submit">
        Ir para pagamento
      </button>

    </form>

  </div>

<script>

const form = document.getElementById("formulario");
const nascimento = document.getElementById("nascimento");
const valor = document.getElementById("valor");

function calcularIdade(data){

  const hoje = new Date();
  const nasc = new Date(data);

  let idade =
    hoje.getFullYear() - nasc.getFullYear();

  const mes =
    hoje.getMonth() - nasc.getMonth();

  if(
    mes < 0 ||
    (mes === 0 && hoje.getDate() < nasc.getDate())
  ){
    idade--;
  }

  return idade;
}

form.addEventListener("submit", function(e){

  e.preventDefault();

  const idade =
    calcularIdade(nascimento.value);

  let preco = 30;

  if(idade >= 18){
    preco = 40;
  }

  valor.style.display = "block";

  valor.innerHTML =
    `Valor da inscrição: R$ ${preco}`;

});

</script>

</body>
</html>
