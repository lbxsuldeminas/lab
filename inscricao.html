<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LBX • Inscrição Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --gold:#f6d365;
  --gold-strong:#d4af37;
  --gold-dark:#8b6b1f;

  --bg:#050505;
  --card:rgba(18,18,18,0.72);

  --white:#ffffff;
  --text:#d7d7d7;
  --muted:#8b8b8b;

  --border:rgba(255,255,255,0.08);

  --shadow:
  0 10px 40px rgba(0,0,0,.45),
  0 0 0 1px rgba(255,255,255,.03);

  --transition:.35s cubic-bezier(.4,0,.2,1);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  overflow-x:hidden;

  font-family:'Inter',sans-serif;
  color:white;

  background:
  radial-gradient(circle at top left, rgba(212,175,55,.18), transparent 30%),
  radial-gradient(circle at bottom right, rgba(246,211,101,.10), transparent 25%),
  linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.85)),
  url('https://images.unsplash.com/photo-1586165368502-1bad197a6461?q=80&w=1600');

  background-size:cover;
  background-position:center;
  position:relative;
}

/* overlay cinematográfico */
body::before{
  content:'';
  position:fixed;
  inset:0;

  background:
  radial-gradient(circle at 20% 20%, rgba(255,255,255,.05), transparent 20%),
  radial-gradient(circle at 80% 80%, rgba(255,255,255,.04), transparent 20%);

  backdrop-filter:blur(2px);

  pointer-events:none;
}

/* partículas */
body::after{
  content:'';
  position:fixed;
  inset:0;

  background-image:
  radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);

  background-size:32px 32px;
  opacity:.25;

  pointer-events:none;
}

/* ================= CARD ================= */

.card{
  width:100%;
  max-width:480px;

  position:relative;
  overflow:hidden;

  background:var(--card);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(18px);

  border-radius:30px;

  padding:34px;

  box-shadow:
  0 0 0 1px rgba(255,255,255,.03),
  0 20px 60px rgba(0,0,0,.65),
  0 0 60px rgba(212,175,55,.08);

  animation:cardEntrance .8s ease;
}

/* brilho dourado */
.card::before{
  content:'';
  position:absolute;
  inset:0;

  border-radius:30px;
  padding:1px;

  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,.08),
    rgba(212,175,55,.35),
    rgba(255,255,255,.03)
  );

  -webkit-mask:
  linear-gradient(#fff 0 0) content-box,
  linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;
  mask-composite:exclude;

  pointer-events:none;
}

/* glow */
.card::after{
  content:'';
  position:absolute;

  width:220px;
  height:220px;

  background:radial-gradient(circle, rgba(212,175,55,.18), transparent 70%);

  top:-100px;
  right:-80px;

  pointer-events:none;
}

/* ================= TÍTULO ================= */

.titulo{
  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;

  margin-bottom:32px;
}

.titulo-texto{
  text-align:center;
}

.logo-badge{
  width:58px;
  height:58px;

  margin:0 auto 14px;

  border-radius:18px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:28px;

  background:
  linear-gradient(135deg,
  rgba(246,211,101,.25),
  rgba(212,175,55,.08));

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  inset 0 1px 0 rgba(255,255,255,.08),
  0 10px 30px rgba(212,175,55,.15);

  backdrop-filter:blur(12px);
}

.titulo-principal{
  font-size:40px;
  font-weight:800;

  letter-spacing:2px;

  background:linear-gradient(135deg,#fff,#f6d365,#d4af37);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.titulo-sub{
  margin-top:8px;

  color:#cfcfcf;
  font-size:15px;
  font-weight:500;

  opacity:.85;
}

/* ================= INFO ================= */

.info-icon{
  position:absolute;
  right:0;
  top:8px;

  width:34px;
  height:34px;

  border-radius:50%;

  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  color:var(--gold);

  font-weight:700;

  cursor:pointer;

  transition:var(--transition);
}

.info-icon:hover{
  transform:scale(1.08);
  background:rgba(212,175,55,.15);
  box-shadow:0 0 20px rgba(212,175,55,.25);
}

.info-box{
  display:none;

  position:absolute;
  top:62px;
  left:50%;
  transform:translateX(-50%);

  width:260px;
  max-width:85vw;

  background:rgba(20,20,20,.95);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(14px);

  padding:16px;

  border-radius:18px;

  text-align:center;

  font-size:13px;
  line-height:1.7;

  color:#d6d6d6;

  box-shadow:
  0 20px 40px rgba(0,0,0,.5);

  animation:fadeUp .35s ease;

  z-index:999;
}

/* ================= FORM ================= */

form{
  display:flex;
  flex-direction:column;
  gap:4px;
}

label{
  font-size:13px;
  color:#c9c9c9;

  margin-bottom:8px;

  font-weight:600;
}

.input-group{
  position:relative;
}

input,
select,
textarea{
  width:100%;

  border:none;
  outline:none;

  border-radius:18px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.06);

  color:white;

  font-size:15px;

  padding:16px 18px;

  transition:var(--transition);

  backdrop-filter:blur(10px);
}

input:hover,
select:hover,
textarea:hover{
  border-color:rgba(212,175,55,.25);
}

input:focus,
select:focus,
textarea:focus{
  border-color:rgba(246,211,101,.75);

  box-shadow:
  0 0 0 4px rgba(246,211,101,.08),
  0 0 24px rgba(212,175,55,.12);

  transform:translateY(-1px);
}

textarea{
  height:90px;
  resize:none;
  margin-top:14px;
}

/* ================= VALOR ================= */

.valor{
  display:none;

  margin-top:10px;

  background:
  linear-gradient(
    135deg,
    rgba(246,211,101,.18),
    rgba(212,175,55,.10)
  );

  border:1px solid rgba(246,211,101,.18);

  padding:18px;

  border-radius:20px;

  text-align:center;

  font-size:20px;
  font-weight:700;

  color:#fff;

  box-shadow:
  inset 0 1px 0 rgba(255,255,255,.08),
  0 10px 30px rgba(212,175,55,.10);

  animation:fadeUp .5s ease;
}

/* ================= BOTÕES ================= */

button{
  position:relative;
  overflow:hidden;

  width:100%;

  border:none;
  outline:none;

  border-radius:18px;

  padding:17px;

  margin-top:12px;

  background:
  linear-gradient(
    135deg,
    #f6d365,
    #d4af37,
    #8b6b1f
  );

  color:#111;

  font-size:15px;
  font-weight:800;

  letter-spacing:.3px;

  cursor:pointer;

  transition:var(--transition);

  box-shadow:
  0 10px 25px rgba(212,175,55,.25),
  inset 0 1px 0 rgba(255,255,255,.4);
}

/* brilho passando */
button::before{
  content:'';
  position:absolute;
  top:0;
  left:-120%;

  width:80%;
  height:100%;

  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.45),
    transparent
  );

  transform:skewX(-20deg);

  transition:.8s;
}

button:hover::before{
  left:130%;
}

button:hover{
  transform:translateY(-2px) scale(1.01);

  box-shadow:
  0 18px 35px rgba(212,175,55,.30),
  0 0 20px rgba(246,211,101,.18);
}

button:active{
  transform:scale(.98);
}

/* ================= PIX ================= */

#pixArea{
  display:none;

  margin-top:28px;

  text-align:center;

  animation:fadeUp .7s ease;
}

.pix-title{
  font-size:24px;
  font-weight:800;

  margin-bottom:20px;

  background:linear-gradient(135deg,#fff,#f6d365);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.pix-box{
  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,.04),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.06);

  border-radius:24px;

  padding:24px;

  backdrop-filter:blur(12px);

  box-shadow:
  inset 0 1px 0 rgba(255,255,255,.05),
  0 15px 40px rgba(0,0,0,.35);
}

.qr-wrapper{
  position:relative;

  width:240px;
  margin:0 auto 22px;
}

.qr-wrapper::before{
  content:'';
  position:absolute;
  inset:-10px;

  border-radius:28px;

  background:
  linear-gradient(
    135deg,
    rgba(246,211,101,.25),
    rgba(212,175,55,.05)
  );

  filter:blur(18px);

  z-index:-1;
}

.qr-wrapper img{
  width:100%;

  border-radius:24px;

  background:white;

  padding:14px;

  border:1px solid rgba(255,255,255,.08);

  transition:var(--transition);
}

.qr-wrapper img:hover{
  transform:scale(1.02);
}

.pix-info{
  margin-top:10px;

  background:rgba(255,255,255,.03);

  border:1px solid rgba(255,255,255,.05);

  border-radius:18px;

  padding:18px;

  line-height:1.8;

  color:#d4d4d4;

  font-size:14px;
}

.pix-info b{
  color:var(--gold);
}

/* ================= ANIMAÇÕES ================= */

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes cardEntrance{
  from{
    opacity:0;
    transform:translateY(30px) scale(.96);
  }

  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

/* ================= MOBILE ================= */

@media(max-width:540px){

  body{
    padding:14px;
    align-items:flex-start;
  }

  .card{
    margin-top:12px;

    padding:24px;
    border-radius:26px;
  }

  .titulo-principal{
    font-size:34px;
  }

  .titulo-sub{
    font-size:14px;
  }

  input,
  select,
  textarea{
    padding:15px;
    font-size:14px;
  }

  .pix-title{
    font-size:22px;
  }

  .qr-wrapper{
    width:100%;
    max-width:230px;
  }

}

</style>
</head>

<body>

<div class="card">

  <div class="titulo">

    <div class="titulo-texto">

      <div class="logo-badge">🏆</div>

      <div class="titulo-principal">LBX</div>

      <div class="titulo-sub">
        Plataforma Premium de Inscrição em Torneios
      </div>

    </div>

    <span class="info-icon" onclick="toggleInfo()">i</span>

  </div>

  <div id="infoBox" class="info-box">

    <strong style="color:#f6d365;">Valores oficiais</strong>
    <br><br>

    Escolar • R$ 30<br>
    Adulto • R$ 40

    <br><br>

    Após o pagamento, sua inscrição é processada automaticamente.

  </div>

  <form id="formulario">

    <label>Nome completo</label>

    <div class="input-group">
      <input type="text" required placeholder="Digite seu nome completo">
    </div>

    <label>Data de nascimento</label>

    <div class="input-group">
      <input type="date" id="nascimento" required>
    </div>

    <label>Tem cadastro na LBX?</label>

    <div class="input-group">
      <select required>
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
      </select>
    </div>

    <div class="valor" id="valor"></div>

    <button type="submit">
      Continuar para pagamento
    </button>

  </form>

  <div id="pixArea">

    <h2 class="pix-title">
      Pagamento via Pix
    </h2>

    <div class="pix-box">

      <div class="qr-wrapper">

        <img
          src="https://i.ibb.co/qFFC91Mv/IMG-0399.jpg"
          alt="QR Code Pix"
        >

      </div>

      <div class="pix-info">

        <b>Titular</b><br>
        Nelson Roberto Junqueira Meirelles

        <br><br>

        <b>Banco</b><br>
        Mercado Pago

      </div>

      <textarea id="pixKey" readonly>35999291224</textarea>

      <button onclick="copiarPix()">
        Copiar chave Pix
      </button>

    </div>

  </div>

</div>

<script>

const form = document.getElementById("formulario");
const nascimento = document.getElementById("nascimento");
const valor = document.getElementById("valor");
const pixArea = document.getElementById("pixArea");

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzDcjdF5D3_wJAM6z2FuIxTXJXDS0cILM7ITWzwiLEaSgquMu5LzyOjU0-TBYP0jTOD/exec";

function calcularIdade(data){

  const hoje = new Date();
  const nasc = new Date(data);

  let idade = hoje.getFullYear() - nasc.getFullYear();

  const mes = hoje.getMonth() - nasc.getMonth();

  if(mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())){
    idade--;
  }

  return idade;
}

form.addEventListener("submit", async function(e){

  e.preventDefault();

  const nome = form.querySelector('input[type="text"]').value;
  const dataNascimento = nascimento.value;
  const cadastro = form.querySelector("select").value;

  const idade = calcularIdade(dataNascimento);

  let preco = 30;

  if(idade >= 18){
    preco = 40;
  }

  valor.style.display = "block";
  valor.innerHTML = `Valor da inscrição: <strong>R$ ${preco}</strong>`;

  pixArea.style.display = "block";

  pixArea.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });

  try{

    await fetch(SCRIPT_URL, {

      method:"POST",

      body:JSON.stringify({
        nome:nome,
        nascimento:dataNascimento,
        cadastro:cadastro,
        valor:preco
      })

    });

    console.log("Enviado!");

  }catch(err){

    alert("Erro ao enviar inscrição");
    console.log(err);

  }

});

function copiarPix(){

  const pix = document.getElementById("pixKey");

  pix.select();

  navigator.clipboard.writeText(pix.value);

  const botoes = document.querySelectorAll("button");

  botoes.forEach(btn => {

    if(btn.innerText.includes("Copiar")){

      const original = btn.innerHTML;

      btn.innerHTML = "✓ Chave Pix copiada";

      setTimeout(() => {
        btn.innerHTML = original;
      },2000);

    }

  });

}

function toggleInfo(){

  const box = document.getElementById("infoBox");

  if(box.style.display === "block"){

    box.style.display = "none";

  }else{

    box.style.display = "block";

  }

}

</script>

</body>
</html>
