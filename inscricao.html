<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Inscrição LBX</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:#111827;
      padding:25px;
      border-radius:12px;
      width:100%;
      max-width:420px;
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#38bdf8;
    }

    label{
      font-size:14px;
      opacity:0.9;
    }

    input, select{
      width:100%;
      padding:10px;
      margin-top:5px;
      margin-bottom:15px;
      border-radius:8px;
      border:none;
      outline:none;
      font-size:14px;
    }

    input:focus, select:focus{
      box-shadow:0 0 0 2px #38bdf8;
    }

    .valor{
      background:#0ea5e9;
      padding:12px;
      border-radius:8px;
      text-align:center;
      font-weight:bold;
      margin:15px 0;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#16a34a;
      transform:scale(1.02);
    }

    .info{
      text-align:center;
      font-size:12px;
      opacity:0.7;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Inscrição Torneio LBX</h2>

  <form id="formInscricao">

    <label>Nome completo</label>
    <input type="text" id="nome" required>

    <label>Data de nascimento</label>
    <input type="date" id="nascimento" required>

    <label>Já possui cadastro na LBX?</label>
    <select id="cadastro">
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>

    <div class="valor" id="valor">
      Valor da inscrição: -
    </div>

    <button type="submit">Confirmar Inscrição</button>

    <div class="info">
      Após confirmar, você verá o resumo da inscrição.
    </div>

  </form>

</div>

<script>
  const nascimentoInput = document.getElementById("nascimento");
  const valorTexto = document.getElementById("valor");
  const form = document.getElementById("formInscricao");

  function calcularIdade(dataNascimento) {
    const hoje = new Date();
    const nascimento = new Date(dataNascimento);

    let idade = hoje.getFullYear() - nascimento.getFullYear();
    const mes = hoje.getMonth() - nascimento.getMonth();

    if (mes < 0 || (mes === 0 && hoje.getDate() < nascimento.getDate())) {
      idade--;
    }

    return idade;
  }

  nascimentoInput.addEventListener("change", () => {
    const data = nascimentoInput.value;

    if (!data) {
      valorTexto.innerText = "Valor da inscrição: -";
      return;
    }

    const idade = calcularIdade(data);

    valorTexto.innerText =
      "Valor da inscrição: R$" + (idade >= 18 ? 40 : 30);
  });

  form.addEventListener("submit", (e) => {
    e.preventDefault();

    const nome = document.getElementById("nome").value;
    const nascimento = nascimentoInput.value;
    const cadastro = document.getElementById("cadastro").value;

    const idade = calcularIdade(nascimento);
    const valor = idade >= 18 ? 40 : 30;

    alert(
      "INSCRIÇÃO CONFIRMADA ✔\n\n" +
      "Nome: " + nome + "\n" +
      "Nascimento: " + nascimento + "\n" +
      "Idade: " + idade + "\n" +
      "Cadastro LBX: " + cadastro + "\n" +
      "Valor: R$" + valor
    );
  });
</script>

</body>
</html>
