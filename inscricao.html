<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Inscrição LBX</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: radial-gradient(circle at top, #1e3a8a, #0f172a);
      color:white;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:430px;
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.08);
      padding:28px;
      border-radius:16px;
      box-shadow:0 20px 40px rgba(0,0,0,0.5);
    }

    h2{
      text-align:center;
      color:#38bdf8;
      margin-bottom:20px;
      font-weight:700;
    }

    label{
      font-size:13px;
      opacity:0.8;
    }

    input, select, textarea{
      width:100%;
      padding:11px;
      margin-top:6px;
      margin-bottom:14px;
      border-radius:10px;
      border:none;
      outline:none;
      background:#0b1220;
      color:white;
    }

    input:focus, select:focus, textarea:focus{
      box-shadow:0 0 0 2px #38bdf8;
    }

    .valor{
      background:linear-gradient(135deg,#0ea5e9,#22c55e);
      padding:12px;
      border-radius:10px;
      text-align:center;
      font-weight:700;
      margin:15px 0;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }

    button:hover{
      background:#16a34a;
    }

    button:disabled{
      opacity:0.6;
    }

    .loading{
      display:none;
      text-align:center;
      font-size:13px;
      opacity:0.7;
      margin-top:10px;
    }

    #pixArea{
      display:none;
      text-align:center;
      margin-top:20px;
    }

    #qrCode{
      width:250px;
      background:white;
      padding:10px;
      border-radius:10px;
      margin-top:10px;
    }

    textarea{
      height:100px;
      resize:none;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Inscrição Torneio LBX</h2>

  <form id="formInscricao">

    <label>Nome completo</label>
    <input type="text" id="nome" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Data de nascimento</label>
    <input type="date" id="nascimento" required>

    <label>Já possui cadastro na LBX?</label>
    <select id="cadastro">
      <option value="sim">Sim</option>
      <option value="nao">Não</option>
    </select>

    <div class="valor" id="valor">
      Valor da inscrição: -
    </div>

    <button id="btn" type="submit">
      Confirmar Inscrição
    </button>

    <div class="loading" id="loading">
      Gerando pagamento...
    </div>

  </form>

  <div id="pixArea">

    <h3>Pagamento Pix</h3>

    <img id="qrCode">

    <textarea id="pixCopiaCola" readonly></textarea>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwXJa8bNuk6CbqifvhZpNgdqfUcerzu875sAQAS3CceE6QGCXxHLyVHM_HY6YYZqq82/exec";

const form = document.getElementById("formInscricao");
const nascimentoInput = document.getElementById("nascimento");
const valorTexto = document.getElementById("valor");

const btn = document.getElementById("btn");
const loading = document.getElementById("loading");

function calcularIdade(dataNascimento) {

  const hoje = new Date();
  const nascimento = new Date(dataNascimento);

  let idade =
    hoje.getFullYear() - nascimento.getFullYear();

  const mes =
    hoje.getMonth() - nascimento.getMonth();

  if (
    mes < 0 ||
    (mes === 0 &&
    hoje.getDate() < nascimento.getDate())
  ) {
    idade--;
  }

  return idade;
}

// MOSTRAR VALOR AUTOMÁTICO
nascimentoInput.addEventListener("change", () => {

  if (!nascimentoInput.value) return;

  const idade =
    calcularIdade(nascimentoInput.value);

  const valor =
    idade >= 18 ? 40 : 30;

  valorTexto.innerText =
    `Valor da inscrição: R$ ${valor}`;
});

// ENVIAR FORMULÁRIO
form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const nome =
    document.getElementById("nome").value;

  const email =
    document.getElementById("email").value;

  const nascimento =
    nascimentoInput.value;

  const cadastro =
    document.getElementById("cadastro").value;

  const idade =
    calcularIdade(nascimento);

  const valor =
    idade >= 18 ? 40 : 30;

  btn.disabled = true;
  loading.style.display = "block";

  try {

    const resposta = await fetch(API_URL, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        nome,
        email,
        nascimento,
        idade,
        cadastro,
        valor
      })

    });

    const dados = await resposta.json();

    loading.style.display = "none";

    form.style.display = "none";

    document.getElementById("pixArea")
      .style.display = "block";

    document.getElementById("qrCode").src =
      "data:image/png;base64," +
      dados.qr_code_base64;

    document.getElementById("pixCopiaCola").value =
      dados.qr_code;

  } catch (err) {

    loading.style.display = "none";

    btn.disabled = false;

    alert("Erro ao gerar pagamento");

    console.log(err);
  }
});

</script>

</body>
</html>
